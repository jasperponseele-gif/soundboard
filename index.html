<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#070b18" />
  <title>Soundboard</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <div>
        <h1>Soundboard</h1>
        <p class="subtitle">door jasper</p>
      </div>
      <div class="topbar-actions">
        <button id="themeToggle" type="button" class="theme-toggle" title="Donkere modus">🌙</button>
        <button id="randomBtn" type="button" class="upload-link-btn">🎲 Random</button>
        <a class="upload-link-btn" href="upload.html">Upload Sound</a>
      </div>
    </header>

    <p id="updateBanner" class="update-banner" hidden>
      Nieuwe versie beschikbaar. <button id="refreshBtn" type="button" class="small-btn">Ververs</button>
    </p>

    <section class="library-panel">
      <div class="library-head">
        <input id="searchInput" type="search" placeholder="Zoek sound..." />
        <label for="globalVolume" class="volume-inline">
          Volume <span id="volumeValue">100%</span>
          <input id="globalVolume" type="range" min="0" max="1" step="0.01" value="1" />
        </label>
        <div class="volume-presets">
          <button type="button" class="preset-btn" data-volume="0.3">🔈</button>
          <button type="button" class="preset-btn" data-volume="0.6">🔉</button>
          <button type="button" class="preset-btn" data-volume="1">🔊</button>
        </div>
      </div>
      <p id="statusMessage" class="status-message" aria-live="polite"></p>
      
      <div id="recentSection" class="section-header" hidden>
        <p class="section-title">📍 Onlangs gespeeld</p>
      </div>
      <div id="recentGrid" class="sound-grid" aria-live="polite"></div>
      
      <div class="section-header">
        <p class="section-title">📁 Alle sounds</p>
        <span class="keyboard-hint">Druk <span class="kbd">1</span>-<span class="kbd">9</span> voor sneltoets</span>
      </div>
      <div id="soundGrid" class="sound-grid" aria-live="polite"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.SUPABASE_URL = "https://rwuqogqomrihbqsmkxmm.supabase.co";
    window.SUPABASE_ANON_KEY = "sb_publishable_JnHPzrG4Yp0BFHNggLkCYQ_VLE5b5kK";
    window.SUPABASE_BUCKET = "sounds";
  </script>
  <script src="script.js"></script>
</body>
</html>
